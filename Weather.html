<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="background-img/applogo.avif" type="image/x-icon">
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <img src="background-img/applogo.avif">
        <h1>Weather Web</h1>
    </header>
    <div class="search">
    <input id="inputValue" type="text" placeholder="Search a city">
    <button id="searchButton" onclick="searchCity()">Search</button>
    </div>
    <div class="initialContentinfo">
        <img src="search/searchIcon.png">
        <p>🔎Search a City</p>
        <p>Find Out Weather in your Area!</p>
    </div>
    <div class="errorInfo">
        <img src="search/not-found.png">
        <p>City Not Found</p>
        <p>Please check cityname you typed!</p>
    </div>
    <div class="apicall">
        <img src="search/not-found.png">
        <p>Api call limit exceeded </p>
        <p>please try again tommorow!</p>
    </div>
    <div class="ui">
        <div class="timings">
            <div class="timingsui">
                <img src="left_section/sunrise.png">
                <p id="sunrise"> </p>
            </div> 
            <div class="timingsui">
                <img src="left_section/sunset.png">
                <p id="sunset"> </p>
            </div>
            <div class="timingsui">
                <img src="left_section/lat.png">
                <p id="longitude">  </p>
            </div>
            <div class="timingsui">
                <img src="left_section/lon.png">
                <p id="latitude"> </p>
            </div>
            <div class="timingsui">
                <img src="left_section/rain.png">
                <p id="cor"></p>
            </div>
        </div>
    <div>
    <div class="content">
        <div>
            <div class="contentui">
                <img  id="locationimg" src="middle-upper-section/location.png">
            <p id="cityname"></p>
        </div>
            <div class="tempuraturedetails">
            <p id="tempurature"></p>
            <img id="tempimg" src="middle-upper-section/celsius.png">
        </div>
        </div>
        <div class="weathericon">
            <img id="weathertype" src="">
            <p id="weathertext"></p>
        </div>
    </div>
    <div class="additionalinfo">
        <div class="info">
            <img src="middle-lower-section/humidity.png">
            <p id="humidity"> </p>
        </div>
        <div class="info">
            <img src="middle-lower-section/wind.png">
            <p id="wind"></p>
        </div>
        <div class="info">
            <img src="middle-lower-section/pressure.png">
            <p id="pressure"></p>
        </div>
    </div>
</div>
<div class="highlights">
    <div class="highlightsui">
        <img src="right-section/favorite.png">
    <h3>Highlights</h3>   
</div>
<div class="highlightsui">
    <img src="right-section/feelslike.png">
    <p id="feelslike"></p>
</div>
<div class="highlightsui">
    <img src="right-section/mintemp.png">
    <p id="mintemp"></p>
</div>
<div class="highlightsui">
    <img src="right-section/maxtemp.png">
    <p id="maxtemp"></p>
</div>
<div class="highlightsui">
    <img src="right-section/visibility.png">
    <p id="visibility"></p>
</div> 
<div class="highlightsui">
    <img src="right-section/clouds.png">
    <p id="clouds"></p>
</div> 
    
    
</div>
    </div>
    <script src="Weather.js"></script>
</body>
</html>
